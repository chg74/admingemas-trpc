<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}


body{

background:#050816;
padding:20px;
color:white;

}



.box{

max-width:550px;
margin:auto;
background:#111827;
padding:25px;
border-radius:25px;
box-shadow:0 10px 30px #000;

}



h1{

text-align:center;
margin-bottom:25px;

}



input{

width:100%;
height:50px;
margin-bottom:15px;
border:none;
border-radius:12px;
padding:15px;
font-size:17px;

}



button{

width:100%;
height:50px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:18px;
margin-bottom:10px;
cursor:pointer;

}



button:hover{

background:#1d4ed8;

}



.section{

margin-top:25px;
background:#1f2937;
padding:15px;
border-radius:15px;

}



.item{

background:#374151;
padding:15px;
border-radius:12px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;

}



.delete{

background:#dc2626;
width:90px;
height:35px;
font-size:14px;

}


.delete:hover{

background:#b91c1c;

}



.msg{

text-align:center;
color:#22c55e;
margin:15px;

}



.status{

text-align:center;
margin-top:10px;
font-size:18px;

}


</style>


</head>


<body>



<div class="box">


<h1>
🎮 لوحة الأدمن
</h1>



<input id="name"
placeholder="اسم اللعبة / الباتش">


<input id="image"
placeholder="رابط الصورة">


<input id="link"
placeholder="رابط التحميل">



<button onclick="addGame()">

➕ إضافة لعبة كمبيوتر

</button>



<button onclick="addPatch()">

🛠️ إضافة باتش لعبة

</button>



<div class="msg" id="msg"></div>




<div class="section">


<h2>

🎮 ألعاب الكمبيوتر

</h2>


<div id="gamesList"></div>


</div>





<div class="section">


<h2>

🛠️ الباتشات

</h2>


<div id="patchList"></div>


</div>





<div class="section">


<h2>

⚙️ حالة الموقع

</h2>


<button onclick="openSite()">

🟢 تشغيل الموقع

</button>



<button onclick="closeSite()">

🔴 وضع صيانة

</button>



<div class="status" id="status">

</div>


</div>




</div>





<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>



<script>


firebase.initializeApp({

apiKey:"AIzaSyAUc2cH9gVE7RECiW19XQXJNZQxVH96sFE",

authDomain:"zezo-59a8d.firebaseapp.com",

databaseURL:"https://zezo-59a8d-default-rtdb.firebaseio.com",

projectId:"zezo-59a8d"

});



const db=firebase.database();



const msg=document.getElementById("msg");



function addGame(){


addData("games");


}




function addPatch(){


addData("patches");


}




function addData(type){


let name=document.getElementById("name").value.trim();

let image=document.getElementById("image").value.trim();

let link=document.getElementById("link").value.trim();



if(name=="" || image=="" || link==""){

alert("املأ كل البيانات");

return;

}



db.ref(type).push({

name:name,

image:image,

link:link

});



msg.innerHTML="✅ تمت الإضافة بنجاح";



document.getElementById("name").value="";

document.getElementById("image").value="";

document.getElementById("link").value="";



}




function loadList(type,id){



db.ref(type).on("value",snap=>{


let box=document.getElementById(id);


box.innerHTML="";



snap.forEach(item=>{


let d=item.val();


box.innerHTML+=`


<div class="item">


<span>

${d.name}

</span>



<button class="delete"

onclick="removeItem('${type}','${item.key}')">

حذف

</button>


</div>


`;



});



});



}




function removeItem(type,key){


if(confirm("حذف؟")){


db.ref(type+"/"+key).remove();


msg.innerHTML="🗑️ تم الحذف";


}


}




function closeSite(){


db.ref("settings/maintenance").set(true);


document.getElementById("status").innerHTML=

"🔴 الموقع تحت الصيانة";


}



function openSite(){


db.ref("settings/maintenance").set(false);


document.getElementById("status").innerHTML=

"🟢 الموقع يعمل";


}





db.ref("settings/maintenance").on("value",s=>{


if(s.val()==true){

document.getElementById("status").innerHTML=
"🔴 الموقع تحت الصيانة";

}

else{

document.getElementById("status").innerHTML=
"🟢 الموقع يعمل";

}


});



loadList("games","gamesList");

loadList("patches","patchList");



</script>



</body>

</html>
